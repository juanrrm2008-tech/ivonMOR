<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Luna Magica</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Lato:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #020008;
    font-family: 'Lato', sans-serif;
    cursor: default;
    user-select: none;
  }

  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }

  #hint {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,200,220,0.6);
    font-size: clamp(13px, 3vw, 16px);
    letter-spacing: 0.2em;
    font-weight: 300;
    pointer-events: none;
    text-align: center;
    transition: opacity 2s;
    white-space: nowrap;
    font-family: 'Lato', sans-serif;
  }

  #music-icon {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 36px;
    height: 36px;
    opacity: 0.4;
    pointer-events: none;
    transition: opacity 1s;
  }

  #music-icon.playing {
    opacity: 0.75;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.75; }
    50% { transform: scale(1.1); opacity: 1; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Toca el agua para crear magia</div>
<svg id="music-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M9 18V5l12-2v13" stroke="rgba(255,220,240,0.9)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="6" cy="18" r="3" stroke="rgba(255,220,240,0.9)" stroke-width="1.5"/>
  <circle cx="18" cy="16" r="3" stroke="rgba(255,220,240,0.9)" stroke-width="1.5"/>
</svg>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');
const musicIcon = document.getElementById('music-icon');

let W, H, skyH, waterY;
const stars = [];
const ripples = [];
const floatingWords = [];

// Audio
let musicPlaying = false;
let audioEl = null;

const romanticWords = [
  'Ivon','Te Amo Ivon','Siempre Tú','Mi Ivon',
  'Eternidad','Destino','Juan and Ivon',
  'Mi Alma','Te Quiero','Mi Luz','❤',
  'Para Siempre','Amor','Eres mi universo',
  'Mi Todo','Corazón','Ternurita',
  'Soñando','Contigo','Juntos',
  'Felicidad','Magia','Ivon ❤'
];
// ─── AUDIO ─────────────────────────────────────────────────────────────────────
const MP3_URL = 'https://files.catbox.moe/6w27eo.mpeg';

function initAudio() {
  if (audioEl) return;

  audioEl = new Audio(MP3_URL);
  audioEl.loop = true;
  audioEl.volume = 0;

  audioEl.addEventListener('canplay', () => {
    audioEl.currentTime = 0;
  }, { once: true });

  const playPromise = audioEl.play();

  if (playPromise !== undefined) {
    playPromise.then(() => {

      let v = 0;

      const iv = setInterval(() => {
        v = Math.min(1, v + 0.025);
        audioEl.volume = v;

        if (v >= 1) clearInterval(iv);

      }, 80);

      musicPlaying = true;
      musicIcon.classList.add('playing');

    }).catch(() => {

      audioEl = null;

    });
  }
}

function playRippleSound() { }

// ─── SETUP ─────────────────────────────────────────────────────────────────────
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  skyH = H * 0.52;
  waterY = skyH;
  initStars();
  buildMoonTexture();
}

function initStars() {
  stars.length = 0;
  const count = Math.floor(W * H / 1800);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * skyH * 0.92,
      r: Math.random() * 1.6 + 0.2,
      a: Math.random(),
      speed: Math.random() * 0.006 + 0.001,
      phase: Math.random() * Math.PI * 2,
      // some stars have color tint
      hue: Math.random() < 0.15 ? (Math.random() < 0.5 ? 200 : 30) : 0
    });
  }
}

// ─── MOON TEXTURE (offscreen) ──────────────────────────────────────────────────
let moonCanvas, moonCtx, moonR_tex;

function buildMoonTexture() {
  moonR_tex = Math.min(W, H) * 0.22;
  const sz = Math.ceil(moonR_tex * 2 + 10);
  moonCanvas = document.createElement('canvas');
  moonCanvas.width = sz;
  moonCanvas.height = sz;
  moonCtx = moonCanvas.getContext('2d');
  renderMoonTexture();
}

const craterData = [
  // Large craters (maria-like)
  {ox:0.05,  oy:-0.04, r:0.18, depth:1.0},
  {ox:-0.13, oy:0.09,  r:0.14, depth:0.95},
  {ox:0.19,  oy:0.12,  r:0.12, depth:0.9},
  {ox:-0.06, oy:0.22,  r:0.11, depth:0.85},
  {ox:0.23,  oy:-0.17, r:0.10, depth:0.8},
  {ox:-0.20, oy:-0.14, r:0.13, depth:0.9},
  // Medium craters
  {ox:0.09,  oy:-0.24, r:0.08, depth:0.75},
  {ox:-0.27, oy:0.06,  r:0.07, depth:0.7},
  {ox:0.02,  oy:0.30,  r:0.08, depth:0.75},
  {ox:0.29,  oy:0.20,  r:0.07, depth:0.7},
  {ox:-0.09, oy:-0.31, r:0.07, depth:0.65},
  {ox:0.33,  oy:-0.06, r:0.06, depth:0.65},
  {ox:-0.33, oy:0.19,  r:0.06, depth:0.6},
  {ox:0.16,  oy:0.33,  r:0.06, depth:0.65},
  {ox:-0.23, oy:-0.29, r:0.07, depth:0.7},
  // Small craters
  {ox:0.38,  oy:0.08,  r:0.04, depth:0.6},
  {ox:-0.38, oy:-0.05, r:0.04, depth:0.55},
  {ox:0.12,  oy:0.38,  r:0.04, depth:0.6},
  {ox:-0.10, oy:0.35,  r:0.05, depth:0.6},
  {ox:0.35,  oy:-0.22, r:0.04, depth:0.55},
  {ox:-0.15, oy:-0.38, r:0.04, depth:0.55},
  {ox:0.28,  oy:-0.30, r:0.05, depth:0.6},
  {ox:-0.30, oy:0.30,  r:0.04, depth:0.55},
  {ox:0.0,   oy:-0.38, r:0.04, depth:0.5},
  {ox:0.40,  oy:0.25,  r:0.03, depth:0.5}
];

function renderMoonTexture() {
  const mc = moonCtx;
  const sz = moonCanvas.width;
  const cx = sz / 2, cy = sz / 2;
  const mr = moonR_tex;

  mc.clearRect(0, 0, sz, sz);

  // Clip to moon circle
  mc.save();
  mc.beginPath();
  mc.arc(cx, cy, mr, 0, Math.PI * 2);
  mc.clip();

  // Base moon color – bright full moon, white-grey realistic
  const baseG = mc.createRadialGradient(cx - mr*0.1, cy - mr*0.1, mr*0.02, cx, cy, mr);
  baseG.addColorStop(0,   '#f8f6f0');
  baseG.addColorStop(0.3, '#ede8dc');
  baseG.addColorStop(0.65,'#d4cfc0');
  baseG.addColorStop(1,   '#a8a090');
  mc.fillStyle = baseG;
  mc.fillRect(0, 0, sz, sz);

  // Procedural noise texture (pixel-level grain simulation via small arcs)
  for (let i = 0; i < 1800; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist  = Math.random() * mr * 0.97;
    const px = cx + Math.cos(angle) * dist;
    const py = cy + Math.sin(angle) * dist;
    const bright = Math.random();
    const col = bright > 0.5 
      ? `rgba(255,252,245,${0.04 + bright * 0.06})`
      : `rgba(80,75,65,${0.02 + (1 - bright) * 0.05})`;
    mc.beginPath();
    mc.arc(px, py, 0.5 + Math.random() * 1.2, 0, Math.PI * 2);
    mc.fillStyle = col;
    mc.fill();
  }

  // Procedural noise-like patches (maria - dark lunar seas) — more contrast
  const maria = [
    {ox:-0.04,oy:-0.14,rx:0.42,ry:0.32,angle:-0.3,a:0.32},
    {ox:0.16, oy:0.24, rx:0.28,ry:0.22,angle:0.5,a:0.28},
    {ox:-0.26,oy:0.16, rx:0.22,ry:0.17,angle:-0.8,a:0.24},
    {ox:0.21, oy:-0.21,rx:0.20,ry:0.14,angle:0.2,a:0.20},
    {ox:-0.10,oy:0.38, rx:0.15,ry:0.12,angle:1.1,a:0.18},
    {ox:0.35, oy:0.10, rx:0.14,ry:0.10,angle:-0.5,a:0.16}
  ];
  for (const m of maria) {
    mc.save();
    mc.translate(cx + m.ox * mr, cy + m.oy * mr);
    mc.rotate(m.angle);
    const mg = mc.createRadialGradient(0, 0, 0, 0, 0, m.rx * mr);
    mg.addColorStop(0,   `rgba(65,60,52,${m.a})`);
    mg.addColorStop(0.5, `rgba(70,65,55,${m.a * 0.55})`);
    mg.addColorStop(1,   'rgba(70,65,55,0)');
    mc.scale(1, m.ry / m.rx);
    mc.beginPath();
    mc.arc(0, 0, m.rx * mr, 0, Math.PI * 2);
    mc.fillStyle = mg;
    mc.fill();
    mc.restore();
  }

  // Craters with realistic shading
  for (const c of craterData) {
    const ccx = cx + c.ox * mr;
    const ccy = cy + c.oy * mr;
    const cr  = c.r * mr;

    // Ejecta blanket (bright ray around crater)
    const ejecG = mc.createRadialGradient(ccx, ccy, cr * 0.9, ccx, ccy, cr * 1.6);
    ejecG.addColorStop(0,   `rgba(240,235,220,${c.depth * 0.18})`);
    ejecG.addColorStop(1,   'rgba(240,235,220,0)');
    mc.beginPath();
    mc.arc(ccx, ccy, cr * 1.6, 0, Math.PI * 2);
    mc.fillStyle = ejecG;
    mc.fill();

    // Shadow bowl
    const shadowG = mc.createRadialGradient(
      ccx + cr*0.22, ccy + cr*0.22, 0,
      ccx, ccy, cr
    );
    shadowG.addColorStop(0,   `rgba(30,25,20,${c.depth * 0.65})`);
    shadowG.addColorStop(0.45,`rgba(45,40,32,${c.depth * 0.4})`);
    shadowG.addColorStop(1,   'rgba(45,40,32,0)');
    mc.beginPath();
    mc.arc(ccx, ccy, cr, 0, Math.PI * 2);
    mc.fillStyle = shadowG;
    mc.fill();

    // Bright rim highlight (sunlit NW edge for full moon — from slightly above)
    mc.beginPath();
    mc.arc(ccx, ccy, cr, Math.PI * 0.75, Math.PI * 1.75);
    mc.strokeStyle = `rgba(245,240,225,${c.depth * 0.65})`;
    mc.lineWidth = cr * 0.22;
    mc.stroke();

    // Inner floor
    const floorG = mc.createRadialGradient(ccx, ccy, 0, ccx, ccy, cr * 0.7);
    floorG.addColorStop(0, `rgba(170,165,152,${c.depth * 0.3})`);
    floorG.addColorStop(1, 'rgba(170,165,152,0)');
    mc.beginPath();
    mc.arc(ccx, ccy, cr * 0.7, 0, Math.PI * 2);
    mc.fillStyle = floorG;
    mc.fill();
  }

  // NO terminator — full moon is fully illuminated

  // Limb darkening (realistic — edges darker)
  const limbG = mc.createRadialGradient(cx, cy, mr * 0.55, cx, cy, mr);
  limbG.addColorStop(0, 'rgba(0,0,0,0)');
  limbG.addColorStop(0.75,'rgba(0,0,0,0.08)');
  limbG.addColorStop(1,   'rgba(0,0,0,0.45)');
  mc.beginPath();
  mc.arc(cx, cy, mr, 0, Math.PI * 2);
  mc.fillStyle = limbG;
  mc.fill();

  // Very subtle warm tint in center (full moon glow)
  const warmG = mc.createRadialGradient(cx, cy, 0, cx, cy, mr * 0.5);
  warmG.addColorStop(0, 'rgba(255,248,230,0.08)');
  warmG.addColorStop(1, 'rgba(255,248,230,0)');
  mc.fillStyle = warmG;
  mc.fillRect(0, 0, sz, sz);

  mc.restore();
}

// ─── DRAW FUNCTIONS ─────────────────────────────────────────────────────────────
function drawSky(t) {
  const sg = ctx.createLinearGradient(0, 0, 0, skyH);
  sg.addColorStop(0,   '#030010');
  sg.addColorStop(0.3, '#0d0028');
  sg.addColorStop(0.65,'#250040');
  sg.addColorStop(1,   '#4a1040');
  ctx.fillStyle = sg;
  ctx.fillRect(0, 0, W, skyH);
}

function drawWater(t) {
  const wg = ctx.createLinearGradient(0, waterY, 0, H);
  wg.addColorStop(0,   '#2d0040');
  wg.addColorStop(0.25,'#180030');
  wg.addColorStop(1,   '#050010');
  ctx.fillStyle = wg;
  ctx.fillRect(0, waterY, W, H - waterY);

  // Shimmer lines
  ctx.save();
  const lineCount = 42;
  for (let i = 0; i < lineCount; i++) {
    const ly = waterY + (i / lineCount) * (H - waterY);
    const wave = Math.sin(t * 0.5 + i * 0.35) * 0.5 + 0.5;
    const alpha = (0.02 + 0.07 * wave) * (1 - i / lineCount * 0.7);
    const lineW = W * (0.15 + 0.55 * (0.5 + 0.5 * Math.sin(t * 0.3 + i)));
    const lx = (W - lineW) * (0.5 + 0.5 * Math.sin(t * 0.2 + i * 0.7)) ;
    ctx.strokeStyle = `rgba(180,140,200,${alpha})`;
    ctx.lineWidth = 0.4 + 0.8 * wave;
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(lx + lineW, ly);
    ctx.stroke();
  }
  ctx.restore();
}

function drawStars(t) {
  for (const s of stars) {
    const a = 0.35 + 0.65 * Math.abs(Math.sin(s.phase + t * s.speed));
    if (s.hue === 0) {
      ctx.fillStyle = `rgba(255,250,255,${a})`;
    } else if (s.hue === 200) {
      ctx.fillStyle = `rgba(180,220,255,${a})`;
    } else {
      ctx.fillStyle = `rgba(255,220,180,${a})`;
    }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();

    // Cross sparkle for bigger stars
    if (s.r > 1.2) {
      ctx.strokeStyle = `rgba(255,250,255,${a * 0.4})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(s.x - s.r * 3, s.y);
      ctx.lineTo(s.x + s.r * 3, s.y);
      ctx.moveTo(s.x, s.y - s.r * 3);
      ctx.lineTo(s.x, s.y + s.r * 3);
      ctx.stroke();
    }
  }
}

function drawMoon(t) {
  const mx = W / 2;
  const my = skyH * 0.48;
  const mr = moonR_tex;

  // Atmospheric halo (multi-layer)
  for (let i = 3; i >= 1; i--) {
    const haloR = mr * (1.3 + i * 0.3);
    const hg = ctx.createRadialGradient(mx, my, mr, mx, my, haloR);
    hg.addColorStop(0, `rgba(200,190,160,${0.07 / i})`);
    hg.addColorStop(1, 'rgba(200,190,160,0)');
    ctx.beginPath();
    ctx.arc(mx, my, haloR, 0, Math.PI * 2);
    ctx.fillStyle = hg;
    ctx.fill();
  }

  // Very subtle slow breathing glow
  const breathe = 0.5 + 0.5 * Math.sin(t * 0.25);
  const glowA = 0.08 + 0.04 * breathe;
  const gg = ctx.createRadialGradient(mx, my, mr * 0.9, mx, my, mr * 1.5);
  gg.addColorStop(0, `rgba(230,220,200,${glowA})`);
  gg.addColorStop(1, 'rgba(230,220,200,0)');
  ctx.beginPath();
  ctx.arc(mx, my, mr * 1.5, 0, Math.PI * 2);
  ctx.fillStyle = gg;
  ctx.fill();

  // Draw the pre-rendered moon texture
  if (moonCanvas) {
    const off = moonCanvas.width / 2;
    ctx.save();
    ctx.beginPath();
    ctx.arc(mx, my, mr, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(moonCanvas, mx - off, my - off);
    ctx.restore();
  }

  // Slight bluish atmosphere tint overlay
  const atmG = ctx.createRadialGradient(mx, my, mr * 0.7, mx, my, mr);
  atmG.addColorStop(0, 'rgba(180,200,240,0)');
  atmG.addColorStop(1, 'rgba(180,200,240,0.06)');
  ctx.beginPath();
  ctx.arc(mx, my, mr, 0, Math.PI * 2);
  ctx.fillStyle = atmG;
  ctx.fill();
}

function drawMoonReflection(t) {
  const mx = W / 2;
  const refY = waterY + (H - waterY) * 0.28;
  const mr = moonR_tex * 0.82;

  ctx.save();
  ctx.beginPath();
  ctx.rect(0, waterY, W, H - waterY);
  ctx.clip();

  ctx.globalAlpha = 0.25 + 0.05 * Math.sin(t * 0.35);

  // Glow
  const rg = ctx.createRadialGradient(mx, refY, mr * 0.3, mx, refY, mr * 1.6);
  rg.addColorStop(0,   'rgba(200,190,160,0.5)');
  rg.addColorStop(0.6, 'rgba(160,150,120,0.15)');
  rg.addColorStop(1,   'rgba(160,150,120,0)');
  ctx.beginPath();
  ctx.arc(mx, refY, mr * 1.6, 0, Math.PI * 2);
  ctx.fillStyle = rg;
  ctx.fill();

  // Column of light on water
  const colW = mr * 0.9;
  const colG = ctx.createLinearGradient(mx - colW, refY, mx + colW, refY);
  colG.addColorStop(0,   'rgba(200,190,160,0)');
  colG.addColorStop(0.4, 'rgba(210,200,170,0.18)');
  colG.addColorStop(0.5, 'rgba(230,220,190,0.28)');
  colG.addColorStop(0.6, 'rgba(210,200,170,0.18)');
  colG.addColorStop(1,   'rgba(200,190,160,0)');
  ctx.fillStyle = colG;
  ctx.fillRect(mx - colW, refY, colW * 2, H - refY);

  // Wavy distortion lines
  ctx.globalAlpha = 0.14;
  for (let i = -mr; i < mr; i += 4) {
    const ly = refY + i;
    if (ly < waterY) continue;
    const wave = 5 * Math.sin(t * 1.1 + i * 0.25);
    const lw = 2 * Math.sqrt(Math.max(0, mr * mr - i * i));
    ctx.strokeStyle = 'rgba(220,210,180,0.8)';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.moveTo(mx - lw * 0.5 + wave, ly);
    ctx.lineTo(mx + lw * 0.5 + wave, ly);
    ctx.stroke();
  }

  ctx.restore();
}

function drawRipples(t) {
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    r.age += 0.016;
    if (r.age > r.life) { ripples.splice(i, 1); continue; }

    const prog = r.age / r.life;
    const maxR = r.maxR * prog;
    const alpha = (1 - prog) * 0.5;

    ctx.save();
    ctx.strokeStyle = `rgba(210,180,220,${alpha})`;
    ctx.lineWidth = 1.1 * (1 - prog * 0.5);
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, maxR, maxR * 0.3, 0, 0, Math.PI * 2);
    ctx.stroke();

    if (prog > 0.12) {
      ctx.strokeStyle = `rgba(240,210,230,${alpha * 0.55})`;
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.ellipse(r.x, r.y, maxR * 0.55, maxR * 0.55 * 0.3, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawFloatingWords(t) {
  ctx.save();
  for (let i = floatingWords.length - 1; i >= 0; i--) {
    const fw = floatingWords[i];
    fw.age += 0.016;

    // Aún no es su turno de aparecer
    if (fw.age < 0) continue;
    if (fw.age > fw.life) { floatingWords.splice(i, 1); continue; }

    const prog = fw.age / fw.life;
    const easeIn  = Math.min(1, prog * 5);
    const easeOut = 1 - Math.max(0, (prog - 0.6) / 0.4);
    const alpha   = easeIn * easeOut;

    fw.y -= fw.vy * 0.016;
    fw.x += Math.sin(fw.age * fw.wobble) * 0.25;

    ctx.globalAlpha = alpha;

    // Tamaño de fuente adaptado a pantalla
    const fontSize = Math.min(fw.size, W * 0.07);
    ctx.font = `${fw.weight} ${fontSize}px 'Playfair Display', serif`;
    ctx.textAlign = 'center';

    // Glow brillante
    ctx.shadowColor = fw.glowColor;
    ctx.shadowBlur = 22;
    ctx.fillStyle = fw.color;
    ctx.fillText(fw.text, fw.x, fw.y);
    ctx.shadowBlur = 10;
    ctx.fillText(fw.text, fw.x, fw.y);
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

// ─── INTERACTION ────────────────────────────────────────────────────────────────
function spawnRippleAndWords(x, y) {
  if (y < waterY) return;

  for (let i = 0; i < 3; i++) {
    ripples.push({
      x, y,
      maxR: 55 + i * 48 + Math.random() * 25,
      life: 2.4 + i * 0.7,
      age: i * 0.28
    });
  }

  // Spawn palabras bien separadas — cuadrícula aleatoria para evitar superposición
  const wCount = 4 + Math.floor(Math.random() * 3); // 4–6 palabras
  
  // Dividir la pantalla en zonas para que no se amontonen
  const zones = [
    { xMin: 0.05, xMax: 0.30, yMin: 0.55, yMax: 0.80 },
    { xMin: 0.30, xMax: 0.55, yMin: 0.60, yMax: 0.85 },
    { xMin: 0.55, xMax: 0.80, yMin: 0.55, yMax: 0.80 },
    { xMin: 0.70, xMax: 0.95, yMin: 0.65, yMax: 0.90 },
    { xMin: 0.10, xMax: 0.40, yMin: 0.75, yMax: 0.95 },
    { xMin: 0.45, xMax: 0.75, yMin: 0.70, yMax: 0.95 },
  ];
  // Mezclar zonas aleatoriamente
  const shuffled = zones.sort(() => Math.random() - 0.5).slice(0, wCount);

  const palettes = [
    { color: '#ffffff',   glow: 'rgba(255,200,230,0.95)' },
    { color: '#ffd6ee',   glow: 'rgba(255,100,180,0.9)'  },
    { color: '#e8e0ff',   glow: 'rgba(160,120,255,0.9)'  },
    { color: '#fff0a0',   glow: 'rgba(255,210,80,0.85)'  },
    { color: '#c8f0ff',   glow: 'rgba(80,180,255,0.85)'  },
    { color: '#ffcce0',   glow: 'rgba(255,80,140,0.9)'   },
  ];

  // Asegurar palabras únicas por toque
  const used = new Set();
  for (let i = 0; i < wCount; i++) {
    let word;
    do { word = romanticWords[Math.floor(Math.random() * romanticWords.length)]; }
    while (used.has(word) && used.size < romanticWords.length);
    used.add(word);

    const zone = shuffled[i];
    const wx = zone.xMin * W + Math.random() * (zone.xMax - zone.xMin) * W;
    const wy = zone.yMin * H + Math.random() * (zone.yMax - zone.yMin) * H;
    const pal = palettes[Math.floor(Math.random() * palettes.length)];

    floatingWords.push({
      text:      word,
      x:         wx,
      y:         wy,
      vy:        22 + Math.random() * 18,
      life:      3.8 + Math.random() * 2,
      age:       -(i * 0.25),          // escalonar: cada palabra aparece 0.25s después
      color:     pal.color,
      glowColor: pal.glow,
      size:      24 + Math.floor(Math.random() * 16),
      weight:    '500',
      wobble:    0.5 + Math.random() * 0.9
    });
  }

  hint.style.opacity = '0';
}

// ─── LOOP ───────────────────────────────────────────────────────────────────────
let lastT = 0;
function loop(ts) {
  const t = ts / 1000;
  lastT = t;

  ctx.clearRect(0, 0, W, H);
  drawSky(t);
  drawWater(t);
  drawStars(t);
  drawMoon(t);
  drawMoonReflection(t);
  drawRipples(t);
  drawFloatingWords(t);

  requestAnimationFrame(loop);
}

// ─── INPUT ──────────────────────────────────────────────────────────────────────
function handleInput(e) {
  e.preventDefault();

  // Arrancar música en cualquier toque, sin importar dónde
  if (!audioEl) initAudio();

  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const touches = e.touches || e.changedTouches;
  if (touches && touches.length > 0) {
    for (const touch of touches) {
      spawnRippleAndWords(
        (touch.clientX - rect.left) * scaleX,
        (touch.clientY - rect.top)  * scaleY
      );
    }
  } else {
    spawnRippleAndWords(
      (e.clientX - rect.left) * scaleX,
      (e.clientY - rect.top)  * scaleY
    );
  }
}

canvas.addEventListener('click',      handleInput);
canvas.addEventListener('touchstart', handleInput, { passive: false });
window.addEventListener('resize',     resize);

resize();
requestAnimationFrame(loop);
</script>
